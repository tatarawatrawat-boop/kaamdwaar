name: kaamdwaar
description: "KaamDwaar Flutter Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  firebase_storage: ^11.7.0
  cloud_firestore: ^4.17.3
  firebase_messaging: ^14.7.10

  # Local Storage
  shared_preferences: ^2.2.2

  # Image & Permission
  image_picker: ^1.0.7


  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.0

  # Razorpay
  razorpay_flutter: ^1.3.6

  # HTTP
  http: ^1.2.1

  # 🎙 Audio
  flutter_sound: ^9.2.13
  permission_handler: ^11.3.1
  just_audio: ^0.9.36
  path_provider: ^2.1.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/