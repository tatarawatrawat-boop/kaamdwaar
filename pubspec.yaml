name: kaamdwaar
description: "KaamDwaar Flutter Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  firebase_storage: ^11.7.0
  cloud_firestore: ^4.17.3

  # Local Storage
  shared_preferences: ^2.2.2

  # Image & Permission
  image_picker: ^1.0.7
  permission_handler: ^11.3.1

  # 🔥 Location Packages
  geolocator: ^10.1.0
  geocoding: ^2.1.0

  # 💰 Razorpay
  razorpay_flutter: ^1.3.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/